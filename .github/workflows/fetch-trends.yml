name: Fetch Pageviews Data

on:
  schedule:
    # Two runs per day to keep "matches played" lag under ~9 hours:
    #  - 08:15 UTC: catches matches finishing overnight (late US kickoffs)
    #  - 23:15 UTC: catches matches finishing during the day (afternoon/evening US kickoffs)
    # Times offset from the hour to avoid GitHub Actions top-of-hour congestion.
    - cron: "15 8 * * *"
    - cron: "15 23 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch pageviews data
        run: python scripts/fetch_trends.py

      - name: Commit updated data
        run: |
          git add data/data.json
          git diff --cached --quiet || git commit -m "chore: update pageviews data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
